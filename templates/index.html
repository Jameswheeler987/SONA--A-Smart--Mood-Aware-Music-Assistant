<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sona</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="hero">
            <h1>SONA 🎵</h1>
            <p>Your smart mood-aware music assistant</p>
        </header>

        <section class="form-section">
            <form method="POST" class="mood-form">
                <label for="mood">Select your mood:</label>
                <select name="mood" id="mood">
                    <option value="happy">Happy</option>
                    <option value="sad">Sad</option>
                    <option value="calm">Calm</option>
                    <option value="energetic">Energetic</option>
                </select>
                <button type="submit">Get Music</button>
            </form>
        </section>

        {% if mood %}
            <section class="results-header">
                <h2>You selected: <span>{{ mood }}</span></h2>
            </section>
        {% endif %}

        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}

        {% if songs %}
            <section class="songs-section">
                <h2>Recommended Songs</h2>

                <div class="songs-grid">
                    {% for song in songs %}
                        <div class="song-card">
                            {% if song.image %}
                                <img src="{{ song.image }}" alt="Album cover" class="album-cover">
                            {% endif %}

                            <div class="song-info">
                                <a href="{{ song.url }}" target="_blank" class="song-link">
                                    {{ song.name }}
                                </a>
                                <p class="artist-name">{{ song.artists }}</p>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </section>
        {% endif %}
    </div>
</body>
</html>
